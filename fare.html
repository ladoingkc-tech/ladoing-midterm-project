</select>
<br><br>
    <label>Select Category:</label>
    <br>
    <select id="category">
    <option value="regular">Regular</option>
    <option value="senior">Senior Citizen</option>
    <option value="student">Student</option>
    <option value="pwd">PWD</option>
</select>
<br><br>
